    <!-- SCRIPT INYECTADO PARA LA VALIDACIÓN MAKE.COM -->
    <script>
      const WEBHOOK = 'https://hook.us2.make.com/iq6ps3txx1jaxr91mje7sx47ynbta3kb';

      function checkReady() {
        const btn = document.getElementById('btn-validar');
        const rut = document.getElementById('rut').value.trim();
        const folio = document.getElementById('folio').value.trim();
        
        if (rut && folio) { 
            btn.removeAttribute('disabled'); 
        } else { 
            btn.setAttribute('disabled', 'disabled'); 
        }
      }

      async function validar() {
        const rut = document.getElementById('rut').value.trim(); 
        const folio = document.getElementById('folio').value.trim();
        if (!rut || !folio) return;
        
        const btn = document.getElementById('btn-validar');
        btn.setAttribute('disabled', 'disabled');
        
        try {
          const res = await fetch(WEBHOOK, { 
              method: 'POST', 
              headers: { 'Content-Type': 'application/json' }, 
              body: JSON.stringify({ rut, uuid: folio, afp: 'Modelo' }) 
          });
          const data = await res.json();
          
          const box = document.getElementById('result-box');
          const hdr = document.getElementById('result-header');
          
          if (data.found) { 
              hdr.innerHTML = "✅ Certificado Válido"; 
              hdr.style.color = "#52c41a"; 
              box.style.display = 'block'; 
          } else { 
              hdr.innerHTML = "❌ No Encontrado"; 
              hdr.style.color = "#f5222d"; 
              box.style.display = 'block'; 
          }
        } catch(e) { 
            console.error(e); 
        }
        
        btn.removeAttribute('disabled');
      }
    </script>
