<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valida certificados de AFP Modelo</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Open Sans',sans-serif;
}

.color-modelo-verde{
color:#8cc63f;
}

.bg-modelo-verde{
background-color:#8cc63f;
}

</style>

</head>

<body class="bg-[#f0f2f5] min-h-screen flex flex-col text-gray-800">

<main class="flex-grow bg-white w-full">

<div class="max-w-2xl mx-auto px-4 py-10">

<h1 class="text-2xl font-light color-modelo-verde mb-6">
Valida certificados de AFP Modelo
</h1>

<div class="flex flex-col gap-4">

<label class="text-sm">
RUT asociado al certificado
</label>

<input
type="text"
id="inputRut"
placeholder="12.345.678-9"
class="border border-gray-200 px-4 py-2"
>

<label class="text-sm">
Folio
</label>

<input
type="text"
id="inputFolio"
name="Folio"
placeholder="Ingresa número de folio"
class="border border-gray-200 px-4 py-2"
>

<div
id="mensajeDiv"
class="text-center text-sm mt-2"
></div>

<button
id="btnValidar"
class="bg-gray-300 text-gray-500 px-4 py-2 mt-4"
disabled
>

Validar Certificado

</button>

</div>

</div>

</main>

<script>

const inputFolio = document.getElementById("inputFolio");
const inputRut = document.getElementById("inputRut");
const btnValidar = document.getElementById("btnValidar");
const mensajeDiv = document.getElementById("mensajeDiv");

inputFolio.addEventListener("input",()=>{

if(inputFolio.value.trim().length>0){

btnValidar.disabled=false;

btnValidar.classList.remove(
"bg-gray-300",
"text-gray-500"
);

btnValidar.classList.add(
"bg-[#8cc63f]",
"text-white"
);

}else{

btnValidar.disabled=true;

btnValidar.classList.add(
"bg-gray-300",
"text-gray-500"
);

}

});

btnValidar.addEventListener("click",async()=>{

const folio=inputFolio.value.trim();
const rut=inputRut.value.trim();

if(!folio)return;

const textoOriginal=btnValidar.innerText;

btnValidar.innerText="Validando...";
btnValidar.disabled=true;

mensajeDiv.innerHTML="";

try{

const urlWebhook="https://hook.us2.make.com/bd3ho31efd4ejqp7yvtq2tbyyc397imz";

const respuesta=await fetch(urlWebhook,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

Folio:folio,
rut:rut

})

});

const datos=await respuesta.json();

if(datos.found===true){

mensajeDiv.innerHTML=
'<span class="text-green-600">✔ Archivo encontrado. Abriendo documento...</span>';

window.location.href=datos.url;

}else{

mensajeDiv.innerHTML=
'<span class="text-red-500">✖ El folio ingresado no fue encontrado.</span>';

}

}catch(error){

mensajeDiv.innerHTML=
'<span class="text-red-500">⚠ Error conectando con el servidor.</span>';

}

btnValidar.innerText=textoOriginal;
btnValidar.disabled=false;

});

</script>

</body>
</html>
